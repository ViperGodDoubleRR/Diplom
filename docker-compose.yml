version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - neura-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Web UI
    networks:
      - neura-net

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - neura-net

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI
    volumes:
      - minio_data:/data
    networks:
      - neura-net

  authservice:
    build:
      context: ./back
      dockerfile: AuthService.Api/Dockerfile
    container_name: authservice
    ports:
      - "5001:8080"
    depends_on:
      - sqlserver
      - rabbitmq
      - redis
      - minio
    networks:
      - neura-net

  regservice:
    build:
      context: ./back
      dockerfile: RegService.Api/Dockerfile
    container_name: regservice
    ports:
      - "5002:8080"
    depends_on:
      - sqlserver
      - rabbitmq
      - redis
      - minio
    networks:
      - neura-net

networks:
  neura-net:
    driver: bridge

volumes:
  sql_data:
  minio_data:
